<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Daphne & Daniel</title>
    <style>
        :root {
            --color-sobre: #6b4f3a; 
            --color-sobre-oscuro: #543d2d;
            --color-sello: #d4bc8a; 
            --dorado-brillante: #e5cf9e;
            --dorado-oscuro: #b8955a;
            --fondo: #f5f2ed;
            --fuente: 'Georgia', serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            font-family: var(--fuente);
            background-color: var(--fondo);
            overflow: hidden;
        }

        /* --- PANTALLA 1: EL SOBRE --- */
        #seccion-sobre {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            width: 100%;
            transition: opacity 0.8s ease;
            padding: 20px;
        }

        /* Contenedor del sobre responsivo */
        .sobre-wrapper {
            position: relative;
            width: 85vw; /* Un poco más pequeño para dejar aire a los lados */
            max-width: 400px; /* Tamaño máximo para tablets/escritorio */
            aspect-ratio: 3 / 2;
            cursor: pointer;
            perspective: 1000px;
        }

        .sobre-cuerpo {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-sobre);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            z-index: 10;
        }

        /* SOLAPA CORREGIDA: Usa SVG para que sea 100% responsiva sin fallos de borde */
        .solapa-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: var(--color-sobre);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            z-index: 30;
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.2));
        }

        .monograma {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: clamp(30px, 8vw, 50px);
            letter-spacing: 8px;
            font-weight: 300;
            pointer-events: none;
        }

        .sello {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background-color: var(--color-sello);
            border-radius: 50%;
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: opacity 0.4s;
        }

        .sello::after {
            content: "🌿"; 
            font-size: 22px;
            opacity: 0.8;
        }

        .texto-guia {
            margin-top: 30px;
            font-size: 0.8rem;
            background: linear-gradient(to right, var(--dorado-oscuro), var(--dorado-brillante), var(--dorado-oscuro));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            font-weight: bold;
            animation: brilloDorado 2.5s infinite linear;
            background-size: 200% auto;
            text-align: center;
        }

        @keyframes brilloDorado {
            0% { background-position: 0% center; opacity: 0.8; }
            50% { opacity: 1; }
            100% { background-position: 200% center; opacity: 0.8; }
        }

        /* --- VISTA 2: EL PASE --- */
        #seccion-pase {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.2s ease;
            z-index: 100;
            padding: 20px;
        }

        .tarjeta-detalle {
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            border: 1px solid #eee;
            text-align: center;
            background: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .boda-titulo { font-size: clamp(1.6rem, 7vw, 2.2rem); color: var(--color-sobre); margin: 10px 0; }
        .boda-subtitulo { font-size: 0.75rem; letter-spacing: 2px; color: #a18a68; text-transform: uppercase; }
        
        .caja-invitado {
            background-color: #f9f7f5;
            padding: 20px 10px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .nombre-invitado { font-size: 1.2rem; font-weight: bold; color: #222; }
        .pases-n { color: var(--color-sobre); font-weight: bold; font-size: 0.9rem; margin-top: 5px; }

        .tag-fiesta {
            font-weight: bold;
            color: var(--color-sello);
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
            font-size: 0.75rem;
        }

        .info-evento { font-size: 0.95rem; line-height: 1.5; color: #444; }

        /* Estados de animación */
        .abrir-sobre .solapa-svg { transform: rotateX(180deg); z-index: 5; }
        .abrir-sobre .sello { opacity: 0; pointer-events: none; }

    </style>
</head>
<body>

    <div id="seccion-sobre">
        <div class="sobre-wrapper" id="sobre" onclick="ejecutarApertura()">
            <svg class="solapa-svg" viewBox="0 0 500 320" preserveAspectRatio="none">
                <polygon points="0,0 500,0 250,220" />
            </svg>
            
            <div class="monograma">DD</div>
            <div class="sello"></div>
            <div class="sobre-cuerpo"></div>
        </div>
        <div class="texto-guia" onclick="ejecutarApertura()">Toca para abrir invitación</div>
    </div>

    <div id="seccion-pase">
        <div class="tarjeta-detalle">
            <span class="tag-fiesta">SÁBADO · 08 · AGOSTO · 2026</span>
            <div class="boda-subtitulo">Invitación a Fiesta</div>
            <div class="boda-titulo">Daphne & Daniel</div>
            
            <div class="caja-invitado">
                <div class="nombre-invitado">Gustavo Villota y Sra.</div>
                <div class="pases-n">Válido por 2 Pases</div>
            </div>

            <div class="info-evento">
                <strong>Casa San Juan, Cumbayá</strong><br>
                Quito, Ecuador<br>
                A partir de las 19:30 hs
            </div>

            <p style="margin-top: 30px; font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px;">Favor presentar este pase al ingresar</p>
        </div>
    </div>

    <script>
        // Fix para altura real en móviles (evita el problema de la barra de direcciones)
        function ajustarAltura() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        window.addEventListener('resize', ajustarAltura);
        ajustarAltura();

        function ejecutarApertura() {
            const sobre = document.getElementById('sobre');
            const pantallaSobre = document.getElementById('seccion-sobre');
            const pantallaPase = document.getElementById('seccion-pase');

            // 1. Iniciar animación del sobre
            sobre.classList.add('abrir-sobre');

            // 2. Transición suave a la tarjeta
            setTimeout(() => {
                pantallaSobre.style.opacity = '0';
                
                setTimeout(() => {
                    pantallaSobre.style.display = 'none';
                    pantallaPase.style.display = 'flex';
                    
                    setTimeout(() => {
                        pantallaPase.style.opacity = '1';
                    }, 50);
                }, 800);
            }, 1000);
        }
    </script>

</body>
</html>
