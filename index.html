<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invitación Daphne & Daniel</title>
    <style>
        :root {
            --color-sobre: #6b4f3a; 
            --color-sobre-oscuro: #543d2d;
            --color-sello: #d4bc8a; 
            --dorado-brillante: #e5cf9e;
            --dorado-oscuro: #b8955a;
            --fondo: #f5f2ed;
            --fuente: 'Georgia', serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Fix para el rebote en iOS y barras de navegación */
            height: -webkit-fill-available;
            font-family: var(--fuente);
            background-color: var(--fondo);
            overflow: hidden;
            position: fixed; /* Evita scroll elástico en iOS */
        }

        /* --- PANTALLA 1: EL SOBRE --- */
        #seccion-sobre {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            width: 100%;
            transition: opacity 0.8s ease;
            padding: 20px;
        }

        .texto-guia {
            margin-top: 40px;
            font-size: 0.8rem;
            background: linear-gradient(to right, var(--dorado-oscuro), var(--dorado-brillante), var(--dorado-oscuro));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            font-weight: bold;
            text-transform: uppercase;
            animation: brilloDorado 2.5s infinite linear;
            background-size: 200% auto;
            text-align: center;
        }

        @keyframes brilloDorado {
            0% { background-position: 0% center; opacity: 0.8; }
            50% { opacity: 1; }
            100% { background-position: 200% center; opacity: 0.8; }
        }

        /* Contenedor del sobre */
        .sobre-wrapper {
            position: relative;
            width: 85vw;
            max-width: 400px; /* Reducido para mejor ajuste en móviles pequeños */
            aspect-ratio: 5 / 3.5;
            cursor: pointer;
            perspective: 1000px;
        }

        .sobre-cuerpo {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-sobre);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            z-index: 10;
        }

        /* Mejora de la Solapa para que no se deforme */
        .solapa {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 42.5vw solid transparent;
            border-right: 42.5vw solid transparent;
            border-top: 28vw solid var(--color-sobre-oscuro); 
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 30;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        @media (min-width: 470px) {
            .solapa {
                border-left: 200px solid transparent;
                border-right: 200px solid transparent;
                border-top: 132px solid var(--color-sobre-oscuro);
            }
        }

        .monograma {
            position: absolute;
            top: 25px; /* Ajustado para el nuevo tamaño */
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: clamp(30px, 8vw, 50px);
            letter-spacing: 8px;
        }

        .sello {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background-color: var(--color-sello);
            border-radius: 50%;
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }

        /* --- VISTA 2: EL PASE (TARJETA) --- */
        #seccion-pase {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--fondo);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in;
            z-index: 100;
            padding: 20px;
        }

        .tarjeta-detalle {
            width: 100%;
            max-width: 380px;
            padding: 40px 20px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            position: relative;
        }

        /* Decoración de bordes internos */
        .tarjeta-detalle::after {
            content: "";
            position: absolute;
            top: 10px; bottom: 10px; left: 10px; right: 10px;
            border: 1px solid #f0e6d6;
            pointer-events: none;
        }

        .boda-titulo { font-size: clamp(1.6rem, 7vw, 2.2rem); color: var(--color-sobre); margin: 15px 0; }
        .boda-subtitulo { font-size: 0.75rem; letter-spacing: 2px; color: #a18a68; text-transform: uppercase; }
        
        .caja-invitado {
            background-color: #fcfaf8;
            padding: 20px 10px;
            margin: 25px 0;
            border-top: 1px solid #f0e6d6;
            border-bottom: 1px solid #f0e6d6;
        }

        .nombre-invitado { font-size: 1.2rem; font-weight: bold; color: #333; }
        .pases-n { color: var(--color-sobre); font-size: 0.9rem; margin-top: 8px; letter-spacing: 1px; }

        .tag-fiesta {
            font-weight: bold;
            color: var(--dorado-oscuro);
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: block;
            font-size: 0.75rem;
        }

        .info-evento { font-size: 0.95rem; line-height: 1.6; color: #555; }

        /* Estados de animación */
        .abrir-sobre .solapa { transform: rotateX(180deg); }
        .abrir-sobre .sello { opacity: 0; }

    </style>
</head>
<body>

    <div id="seccion-sobre">
        <div class="sobre-wrapper" id="sobre" onclick="ejecutarApertura()">
            <div class="solapa">
                <div class="monograma">DD</div>
            </div>
            <div class="sobre-cuerpo"></div>
        </div>
        <div class="texto-guia" onclick="ejecutarApertura()">Toca para abrir invitación</div>
    </div>

    <div id="seccion-pase">
        <div class="tarjeta-detalle">
            <span class="tag-fiesta">SÁBADO · 08 · AGOSTO · 2026</span>
            <div class="boda-subtitulo">Invitación a Fiesta</div>
            <div class="boda-titulo">Daphne & Daniel</div>
            
            <div class="caja-invitado">
                <div class="nombre-invitado">Gustavo Villota y Sra.</div>
                <div class="pases-n">VÁLIDO POR 2 PASES</div>
            </div>

            <div class="info-evento">
                <strong>Casa San Juan, Cumbayá</strong><br>
                Quito, Ecuador<br>
                A partir de las 19:30 hs
            </div>

            <p style="margin-top: 35px; font-size: 0.65rem; color: #bbb; text-transform: uppercase; letter-spacing: 1.5px;">Favor presentar este pase al ingresar</p>
        </div>
    </div>

    <script>
        // Manejo preciso de la altura en móviles (ignora la barra de direcciones)
        function ajustarAltura() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        window.addEventListener('resize', ajustarAltura);
        window.addEventListener('orientationchange', ajustarAltura);
        ajustarAltura();

        let abierta = false;
        function ejecutarApertura() {
            if (abierta) return;
            abierta = true;

            const sobre = document.getElementById('sobre');
            const pantallaSobre = document.getElementById('seccion-sobre');
            const pantallaPase = document.getElementById('seccion-pase');

            // 1. Iniciar animación de solapa
            sobre.classList.add('abrir-sobre');

            // 2. Transición a la tarjeta
            setTimeout(() => {
                pantallaSobre.style.opacity = '0';
                
                setTimeout(() => {
                    pantallaSobre.style.display = 'none';
                    pantallaPase.style.display = 'flex';
                    
                    // Pequeño delay para que el navegador registre el display:flex antes de la opacidad
                    requestAnimationFrame(() => {
                        pantallaPase.style.opacity = '1';
                    });
                }, 600);
            }, 800);
        }
    </script>

</body>
</html>
